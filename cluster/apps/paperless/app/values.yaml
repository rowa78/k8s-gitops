paperless-ngx:
  #
  # IMPORTANT NOTE
  #
  # This chart inherits from our common library chart. You can check the default values/options here:
  # https://github.com/bjw-s/helm-charts/blob/a081de5/charts/library/common/values.yaml
  #

  image:
    # -- Image repository
    repository: ghcr.io/paperless-ngx/paperless-ngx
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag
    tag: 2.14.7

  # -- Environment variables [[ref]](https://docs.paperless-ngx.com/configuration/)
  # @default -- See [values.yaml](./values.yaml)
  env:
    # -- Set the container timezone
    TZ: UTC
    PAPERLESS_REDIS: redis://paperless-valkey:6379
    PAPERLESS_DBHOST: paperlessdb-rw
    PAPERLESS_DBNAME: paperlessdb
    PAPERLESS_DBUSER: paperless
    PAPERLESS_DBPASS:
      valueFrom:
        secretKeyRef:
          name: paperlessdb-app
          key: password      
      
    #PAPERLESS_TIKA_ENABLED: 1
    #PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
    #PAPERLESS_TIKA_ENDPOINT: http://tika:9998
    #PAPERLESS_URL: ${PAPERLESS_URL}
    #PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}    
    #PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE}
    #PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
    #PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}

  service:
    # -- Configures service settings for the chart.
    # @default -- See [values.yaml](./values.yaml)
    main:
      ports:
        http:
          port: 8000

  ingress:
    # -- Enable and configure ingress settings for the chart under this key.
    # @default -- See [values.yaml](./values.yaml)
    main:
      enabled: false
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: 64m
      # hosts:
      #   - host: chart-example.local
      #     paths:
      #       - path: /
      # tls:
      #   - secretName: chart-example.local
      #     hosts:
      #       - chart-example.local

  persistence:
    # -- Configure data volume settings for the chart under this key.
    # @default -- See [values.yaml](./values.yaml)
    data:
      enabled: true
      retain: true
      mountPath: /usr/src/paperless/data
      storageClass: "longhorn"
      accessMode: ReadWriteOnce
      size: 1Gi
    # -- Configure media volume settings for the chart under this key.
    # @default -- See [values.yaml](./values.yaml)
    media:
      enabled: true
      retain: true
      mountPath: /usr/src/paperless/media
      storageClass: "longhorn"
      accessMode: ReadWriteOnce
      size: 20Gi
    # -- Configure export volume settings for the chart under this key.
    # @default -- See [values.yaml](./values.yaml)
    export:
      enabled: true
      retain: true
      mountPath: /usr/src/paperless/export
      storageClass: "longhorn"
      accessMode: ReadWriteOnce
      size: 10Gi
    # -- Configure consume volume settings for the chart under this key.
    # @default -- See [values.yaml](./values.yaml)
    consume:
      enabled: true
      retain: true
      mountPath: /usr/src/paperless/consume
      storageClass: "longhorn"
      accessMode: ReadWriteOnce
      size: 4Gi

  redis:
    enabled: false