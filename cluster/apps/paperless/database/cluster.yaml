apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperlessdb
  annotations:
    k8up.io/backupcommand: sh -c 'pg_dump --clean paperlessdb'
    k8up.io/file-extension: .sql
    k8up.io/backup: 'false'
    tailscale.com/expose: "true"
spec:
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog # Or 'ImageCatalog'
    name: postgresql-global
    major: 18
  instances: 2

  # resources:
  #   requests:
  #     memory: "100Mi"
  #     cpu: "100m"
  #   limits:
  #     memory: "2Gi"
  #     cpu: "2"
  bootstrap:
    initdb:
      database: paperlessdb
      owner: paperless 
  # bootstrap:
  #   recovery:
  #     source: paperlessdb

  postgresql:
    parameters:        
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all
      hypopg.use_real_oids: 'true'
     
  replicationSlots:
    highAvailability:
      enabled: true

  monitoring:
    enablePodMonitor: true

  enableSuperuserAccess: true

  storage:
    size: 5Gi
    storageClass: longhorn-strict-local
  walStorage:
    size: 5Gi
    storageClass: longhorn-strict-local

  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: minio
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: paperlessdb-backup
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: paperlessdb
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io