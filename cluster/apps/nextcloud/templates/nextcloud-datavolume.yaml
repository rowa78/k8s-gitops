# Imports Debian 13 (Trixie) genericcloud image via CDI (~324 MiB download).
# Direct mirror URL — cloud.debian.org 302-redirects break CDI HTTP import (unexpected EOF).
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: nextcloud-dv
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  source:
    http:
      url: https://saimei.ftp.acc.umu.se/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 100Gi
    storageClassName: longhorn
