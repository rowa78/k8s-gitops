# Exposes host Linux bridges (e.g. br0) as node resources for Multus NAD scheduling.
# Required when NAD uses k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/<bridge>
# https://github.com/kubevirt/bridge-marker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bridge-marker
  namespace: kube-system
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: bridge-marker
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get", "update", "patch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: bridge-marker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bridge-marker
subjects:
  - kind: ServiceAccount
    name: bridge-marker
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: bridge-marker
  namespace: kube-system
  labels:
    app: bridge-marker
spec:
  selector:
    matchLabels:
      app: bridge-marker
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  template:
    metadata:
      labels:
        app: bridge-marker
      annotations:
        description: Exposes host network bridges as node resources for KubeVirt/Multus
    spec:
      serviceAccountName: bridge-marker
      hostNetwork: true
      priorityClassName: system-node-critical
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      containers:
        - name: bridge-marker
          image: quay.io/kubevirt/bridge-marker:0.13.0
          imagePullPolicy: IfNotPresent
          args:
            - -node-name
            - $(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 15Mi
          terminationMessagePolicy: FallbackToLogsOnError
