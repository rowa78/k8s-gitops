apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-auth
  namespace: oauth2-proxy
spec:
  forwardAuth:
    # /oauth2/auth returns 202/401 for ForwardAuth; /oauth2/ redirects and breaks WebSocket upgrades.
    # External URL: Traefik uses hostNetwork and cannot resolve *.svc.cluster.local via router DNS.
    address: https://oauth2-proxy.rwcloud.org/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization
    authRequestHeaders:
      - Cookie
      - Authorization
      - X-Forwarded-Proto
      - X-Forwarded-Host
      - X-Forwarded-Uri
      - X-Forwarded-Method
