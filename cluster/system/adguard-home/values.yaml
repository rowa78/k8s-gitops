metallb:
  ipv4: "192.168.0.240"
  ipv6: "fd00:2222::240"

persistence:
  storageClassName: longhorn
  size: 2Gi

unbound:
  image:
    repository: mvance/unbound
    tag: "1.17.1"
  port: 5335
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  fritzbox:
    ip: "192.168.0.1"
    forwardZones:
      - fritz.box
      - 0.168.192.in-addr.arpa
  upstream:
    - 1.1.1.1@53
    - 8.8.8.8@53

adguard:
  image:
    repository: adguard/adguardhome
    tag: v0.107.61
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  admin:
    username: admin
    # bcrypt hash — replace via SealedSecret or change after first login
    # generate: htpasswd -bnBC 10 "" 'yourpassword' | cut -d: -f2
    #passwordHash: "*********"
    sealedSecret:
      enabled: true
      passwordHash: 
  privateNetworks:
    - 192.168.0.0/24
  localPtrUpstreams:
    - 192.168.0.1
  bootstrapDns:
    - 1.1.1.1
    - 8.8.8.8

ingress:
  enabled: true
  host: adguard.rwcloud.org
  tlsSecretName: adguard-tls
  clusterIssuer: letsencrypt-production
  oauth2:
    enabled: true
    middlewareName: oauth2-auth
    middlewareNamespace: oauth2-proxy
  homepage:
    enabled: true
    description: AdGuard Home
    group: System
    icon: adguard-home.png
