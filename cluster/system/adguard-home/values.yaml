metallb:
  ipv4: "192.168.0.240"
  ipv6: "fd00:2222::240"

persistence:
  storageClassName: longhorn
  conf:
    size: 256Mi
  work:
    size: 2Gi

unbound:
  image:
    repository: mvance/unbound
    tag: "1.17.1"
  port: 5335
  # Feste ClusterIP — AdGuard bootstrap_dns kann *.cluster.local nicht auflösen
  clusterIP: 10.43.0.153
  logging:
    # 0=errors, 1=startup/ops, 2+=details; ohne logfile → stderr (kubectl logs)
    verbosity: 2
    logQueries: false
    logReplies: false
    logServfail: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  fritzbox:
    ip: "192.168.0.1"
    forwardZones:
      - fritz.box
      - 0.168.192.in-addr.arpa
  upstream:
    - 1.1.1.1@53
    - 8.8.8.8@53

adguard:
  image:
    repository: adguard/adguardhome
    tag: v0.107.61
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  admin:
    username: ronny
    # Nur den bcrypt-Hash (ohne "user:"), z.B.:
    # htpasswd -bnBC 10 "" 'mypassword' | cut -d: -f2
    # Oder htpasswd-Zeile sealen — Init-Container entfernt "user:" automatisch
    passwordHash: ""
    sealedSecret:
      enabled: true
      secretName: adguard-admin
      key: passwordHash
      encryptedPasswordHash: 
  privateNetworks:
    - 192.168.0.0/24
  localPtrUpstreams:
    - 192.168.0.1
  bootstrapDns:
    - 10.43.0.10
    - 1.1.1.1
    - 8.8.8.8
  internalDns:
    enabled: true
    wildcard: "*.internal.rwcloud.org"
    targetIpv4: 192.168.0.225
    targetIpv6: fd00:2222::42:c0ff:fea8:babe

ingress:
  enabled: true
  host: adguard.rwcloud.org
  tlsSecretName: adguard-tls
  clusterIssuer: letsencrypt-production
  oauth2:
    enabled: true
    middlewareName: oauth2-auth
    middlewareNamespace: oauth2-proxy
  homepage:
    enabled: true
    description: AdGuard Home
    group: System
    icon: adguard-home.png
