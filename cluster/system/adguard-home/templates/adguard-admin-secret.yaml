{{- if and (not .Values.adguard.admin.sealedSecret.enabled) (required "Set adguard.admin.passwordHash when sealedSecret.enabled is false" .Values.adguard.admin.passwordHash) }}
apiVersion: v1
kind: Secret
metadata:
  name: adguard-admin
  labels:
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  passwordHash: {{ .Values.adguard.admin.passwordHash | quote }}
{{- end }}
