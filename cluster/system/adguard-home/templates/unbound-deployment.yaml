apiVersion: apps/v1
kind: Deployment
metadata:
  name: unbound
  labels:
    app.kubernetes.io/name: unbound
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unbound
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unbound
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: unbound
          image: "{{ .Values.unbound.image.repository }}:{{ .Values.unbound.image.tag }}"
          ports:
            - name: dns
              containerPort: {{ .Values.unbound.port }}
              protocol: UDP
            - name: dns-tcp
              containerPort: {{ .Values.unbound.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /opt/unbound/etc/unbound/unbound.conf
              subPath: unbound.conf
          resources:
            {{- toYaml .Values.unbound.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: unbound
