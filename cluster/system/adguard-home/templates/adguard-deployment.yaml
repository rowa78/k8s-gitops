apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  labels:
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: adguard-home
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adguard-home
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      dnsPolicy: ClusterFirst
      initContainers:
        - name: init-config
          image: busybox:1.36
          env:
            - name: ADMIN_USER
              value: {{ .Values.adguard.admin.username | quote }}
            - name: UNBOUND_UPSTREAM
              value: "udp://{{ .Values.unbound.clusterIP }}:{{ .Values.unbound.port }}"
            - name: FRITZBOX_UPSTREAM
              value: "[/{{ .Values.unbound.fritzbox.forwardZones | first }}/]{{ .Values.unbound.fritzbox.ip }}"
            - name: FRITZBOX_PTR_UPSTREAM
              value: "[/168.192.in-addr.arpa/]{{ .Values.unbound.fritzbox.ip }}"
            {{- if .Values.adguard.internalDns.enabled }}
            - name: INTERNAL_REWRITE_DOMAIN
              value: {{ .Values.adguard.internalDns.wildcard | quote }}
            - name: INTERNAL_REWRITE_IPV4
              value: {{ .Values.adguard.internalDns.targetIpv4 | quote }}
            - name: INTERNAL_REWRITE_IPV6
              value: {{ .Values.adguard.internalDns.targetIpv6 | quote }}
            {{- end }}
            {{- if not .Values.adguard.admin.sealedSecret.enabled }}
            - name: ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adguard.admin.sealedSecret.secretName }}
                  key: {{ .Values.adguard.admin.sealedSecret.key }}
            {{- end }}
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /opt/adguardhome/conf /opt/adguardhome/work/data/filters
              CONF=/opt/adguardhome/conf/AdGuardHome.yaml

              if [ -f /secrets/admin/{{ .Values.adguard.admin.sealedSecret.key }} ]; then
                HASH=$(tr -d '\n\r' < /secrets/admin/{{ .Values.adguard.admin.sealedSecret.key }})
              elif [ -n "${ADMIN_PASSWORD_HASH:-}" ]; then
                HASH=$(printf '%s' "$ADMIN_PASSWORD_HASH" | tr -d '\n\r')
              else
                echo "no admin password configured" >&2
                exit 1
              fi
              case "$HASH" in
                *:*) HASH=${HASH#*:} ;;
              esac

              if [ ! -f "$CONF" ]; then
                sed -e "s|__ADMIN_USERNAME__|${ADMIN_USER}|g" \
                    -e "s|__ADMIN_PASSWORD_HASH__|${HASH}|g" \
                    /config/AdGuardHome.yaml > "$CONF"
              fi

              awk -v user="$ADMIN_USER" -v hash="$HASH" '
                BEGIN { inusers=0; users_written=0 }
                /^users:/ {
                  if (!users_written) {
                    print "users:"
                    print "  - name: " user
                    print "    password: " hash
                    users_written=1
                  }
                  inusers=1
                  next
                }
                inusers && /^[^ ]/ { inusers=0 }
                inusers { next }
                { print }
                END {
                  if (!users_written) {
                    print "users:"
                    print "  - name: " user
                    print "    password: " hash
                  }
                }
              ' "$CONF" > "$CONF.tmp" && mv "$CONF.tmp" "$CONF"

              # upstream_dns: Fritzbox für fritz.box/PTR, danach Unbound
              awk -v fritz="$FRITZBOX_UPSTREAM" -v ptr="$FRITZBOX_PTR_UPSTREAM" -v unbound="$UNBOUND_UPSTREAM" '
                BEGIN { inupstream=0; upstream_written=0 }
                /^      upstream_dns:/ {
                  print "      upstream_dns:"
                  print "        - " fritz
                  print "        - " ptr
                  print "        - " unbound
                  inupstream=1
                  upstream_written=1
                  next
                }
                inupstream && /^      [a-z]/ { inupstream=0 }
                inupstream { next }
                { print }
                END {
                  if (!upstream_written) {
                    print "upstream_dns patch failed: no upstream_dns block" > "/dev/stderr"
                    exit 1
                  }
                }
              ' "$CONF" > "$CONF.tmp" && mv "$CONF.tmp" "$CONF"

              {{- if .Values.adguard.internalDns.enabled }}
              awk -v domain="$INTERNAL_REWRITE_DOMAIN" -v v4="$INTERNAL_REWRITE_IPV4" -v v6="$INTERNAL_REWRITE_IPV6" '
                function print_filtering() {
                  print "filtering:"
                  print "  filtering_enabled: true"
                  print "  rewrites_enabled: true"
                  print "  protection_enabled: true"
                  print "  blocking_mode: default"
                  print "  rewrites:"
                  print "    - domain: " domain
                  print "      answer: " v4
                  print "      enabled: true"
                  print "    - domain: " domain
                  print "      answer: " v6
                  print "      enabled: true"
                }
                BEGIN {
                  filtering_written=0
                  infiltering=0
                  inoldrewrites=0
                }
                # Alte Rewrites unter dns: entfernen (schema < 30)
                /^      rewrites:/ { inoldrewrites=1; next }
                inoldrewrites && /^      [a-z]/ { inoldrewrites=0 }
                inoldrewrites { next }
                /^filtering:/ {
                  if (!filtering_written) { print_filtering(); filtering_written=1 }
                  infiltering=1
                  next
                }
                infiltering && /^[^ ]/ { infiltering=0 }
                infiltering { next }
                /^    filters:/ {
                  if (!filtering_written) { print_filtering(); filtering_written=1 }
                  print
                  next
                }
                { print }
              ' "$CONF" > "$CONF.tmp" && mv "$CONF.tmp" "$CONF"
              {{- end }}
          volumeMounts:
            - name: conf
              mountPath: /opt/adguardhome/conf
            - name: work
              mountPath: /opt/adguardhome/work
            - name: config
              mountPath: /config
            {{- if .Values.adguard.admin.sealedSecret.enabled }}
            - name: admin-secret
              mountPath: /secrets/admin
              readOnly: true
            {{- end }}
      containers:
        - name: adguard-home
          image: "{{ .Values.adguard.image.repository }}:{{ .Values.adguard.image.tag }}"
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: http
              containerPort: 80
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: conf
              mountPath: /opt/adguardhome/conf
            - name: work
              mountPath: /opt/adguardhome/work
          resources:
            {{- toYaml .Values.adguard.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: conf
          persistentVolumeClaim:
            claimName: adguard-conf
        - name: work
          persistentVolumeClaim:
            claimName: adguard-work
        - name: config
          configMap:
            name: adguard-config
        {{- if .Values.adguard.admin.sealedSecret.enabled }}
        - name: admin-secret
          secret:
            secretName: {{ .Values.adguard.admin.sealedSecret.secretName }}
        {{- end }}
