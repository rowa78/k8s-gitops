apiVersion: v1
kind: ConfigMap
metadata:
  name: adguard-config
  labels:
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  AdGuardHome.yaml: |
    http:
      address: 0.0.0.0:80
      session_ttl: 720h
    users:
      - name: __ADMIN_USERNAME__
        password: __ADMIN_PASSWORD_HASH__
    dns:
      bind_hosts:
        - 0.0.0.0
      port: 53
      anonymize_client_ip: false
      ratelimit: 20
      refuse_any: true
      upstream_dns:
        {{- range .Values.adguard.fritzbox.zones }}
        - '[/{{ . }}/]{{ $.Values.adguard.fritzbox.ip }}'
        {{- end }}
        {{- range .Values.adguard.upstreamDns }}
        - {{ . | quote }}
        {{- end }}
      bootstrap_dns:
        {{- range .Values.adguard.bootstrapDns }}
        - {{ . | quote }}
        {{- end }}
      all_servers: false
      fastest_addr: false
      cache_size: 4194304
      cache_ttl_min: 300
      cache_ttl_max: 86400
      private_networks:
        {{- range .Values.adguard.privateNetworks }}
        - {{ . | quote }}
        {{- end }}
      use_private_ptr_resolvers: true
      local_ptr_upstreams:
        {{- range .Values.adguard.localPtrUpstreams }}
        - {{ . | quote }}
        {{- end }}
      upstream_timeout: 10s
    filtering:
      {{- if .Values.adguard.internalDns.enabled }}
      rewrites:
        - domain: {{ .Values.adguard.internalDns.wildcard | quote }}
          answer: {{ .Values.adguard.internalDns.targetIpv4 | quote }}
        - domain: {{ .Values.adguard.internalDns.wildcard | quote }}
          answer: {{ .Values.adguard.internalDns.targetIpv6 | quote }}
      {{- end }}
    filters:
      {{- range .Values.adguard.filters }}
      - enabled: {{ .enabled }}
        url: {{ .url | quote }}
        name: {{ .name | quote }}
        id: {{ .id }}
      {{- end }}
    querylog:
      enabled: true
      interval: 720h
    statistics:
      enabled: true
      interval: 168h
    schema_version: 29
