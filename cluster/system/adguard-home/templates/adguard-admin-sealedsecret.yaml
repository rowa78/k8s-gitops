{{- if .Values.adguard.admin.sealedSecret.enabled }}
# Apply with kubeseal-generated encryptedData — see NOTES.txt
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: adguard-admin
  labels:
    app.kubernetes.io/name: adguard-home
spec:
  encryptedData:
    passwordHash: {{ required "Set adguard.admin.sealedSecret.passwordHash when sealedSecret.enabled is true" .Values.adguard.admin.sealedSecret.passwordHash | quote }}
  template:
    metadata:
      name: adguard-admin
      labels:
        app.kubernetes.io/name: adguard-home
    type: Opaque
{{- end }}
