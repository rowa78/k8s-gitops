# openebs-zfs is RWO-only (WaitForFirstConsumer). Without this profile, KubeVirt
# defaults to ReadWriteMany for vmState PVCs when vmStateStorageClass is set —
# that breaks persistent TPM/UEFI on mars (VARS.fd Permission denied).
apiVersion: cdi.kubevirt.io/v1beta1
kind: StorageProfile
metadata:
  name: openebs-zfs
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  claimPropertySets:
    - accessModes:
        - ReadWriteOnce
      volumeMode: Filesystem
