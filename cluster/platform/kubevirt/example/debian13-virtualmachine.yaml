# Lab example: default login debian/debian — change before any non-lab use.
# Console: virtctl console debian13 -n kubevirt-examples
# SSH:     virtctl ssh debian@debian13 -n kubevirt-examples
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: debian13
  namespace: kubevirt-examples
  labels:
    kubevirt-manager.io/managed: "true"
    kubevirt.io/domain: debian13
    fw.kubevirt-manager.io/vm-name: debian13
    cloud-init.kubevirt-manager.io/username: debian
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/vm: debian13
        kubevirt-manager.io/managed: "true"
        kubevirt.io/domain: debian13
        fw.kubevirt-manager.io/vm-name: debian13
        cloud-init.kubevirt-manager.io/username: debian
    spec:
      domain:
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        devices:
          disks:
            - name: rootdisk
              bootOrder: 1
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 2Gi
            cpu: "2"
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: debian13-dv
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: debian13
              ssh_pwauth: true
              chpasswd:
                list: |
                  debian:debian
                expire: false
              users:
                - name: debian
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  shell: /bin/bash
              package_update: true
              packages:
                - qemu-guest-agent
