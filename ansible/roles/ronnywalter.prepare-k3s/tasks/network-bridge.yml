---
# network_backend: ifupdown (Debian) | netplan (Ubuntu)
# Per-host override in host_vars; default from OS family below.
- name: Resolve LAN bridge network backend
  ansible.builtin.set_fact:
    _lan_bridge_backend: >-
      {{ network_backend | default(
           'netplan' if ansible_facts['distribution'] == 'Ubuntu' else 'ifupdown'
         ) }}

- name: Configure LAN bridge via ifupdown
  ansible.builtin.include_tasks: network-bridge-ifupdown.yml
  when: _lan_bridge_backend == 'ifupdown'

- name: Configure LAN bridge via netplan
  ansible.builtin.include_tasks: network-bridge-netplan.yml
  when: _lan_bridge_backend == 'netplan'
