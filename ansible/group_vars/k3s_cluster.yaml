k3s_state: installed
k3s_release_version: v1.36.1+k3s1
k3s_become: true
k3s_build_cluster: true
# 2 nodes at the moment.
k3s_use_unsupported_config: true

#k3s_etcd_datastore: true

# LAN bridge host networking: ifupdown (Debian) | netplan (Ubuntu).
# Override per host in host_vars; default is Ubuntu → netplan, else ifupdown.
# network_backend: netplan
#

postgresql_password: "{{ lookup('env', 'K3S_POSTGRESQL_PASSWORD') }}"

k3s_server:
  datastore-endpoint: "postgres://k3s:{{ postgresql_password }}@postgresql.fritz.box:5432/k3sdb?sslmode=disable"
  #datastore-endpoint: "http://192.168.100.1:2379,http://192.168.100.2:2379,http://192.168.100.3:2379"
  flannel-iface: eth0
  cluster-cidr: 10.42.0.0/16,fd00:10:42::/48
  service-cidr: 10.43.0.0/16,fd00:10:43::/112
  #flannel-backend: none
  #flannel-ipv6-masq: true
  # node-taint: 
  #   - node-role.kubernetes.io/master=true:NoSchedule
  #   - node-role.kubernetes.io/control-plane=true:NoSchedule
  tls-san: 
    - k3s-luna.fritz.box    
    - 192.168.0.245
  disable:
    - traefik
    # - metrics-server 
    - local-storage
    - servicelb
  nonroot-devices: true
  


  etcd-expose-metrics: true

  #k3s_registration_address: 10.0.0.107